services:
  - type: web
    name: vareva-autogf-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: STORAGE_BACKEND
        value: google_sheets
      - key: GOOGLE_SHEETS_TIMEOUT_SECONDS
        value: 60
      - key: AUTH_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: LLM_MAX_RETRIES
        value: 3
      - key: DATABASE_URL
        value: sqlite:///./gform.db
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: poolside/laguna-xs.2:free
      - key: OPENROUTER_FALLBACK_MODELS
        value: openrouter/free,google/gemma-3-27b-it:free,google/gemma-3-12b-it:free,meta-llama/llama-3.3-70b-instruct:free,mistralai/mistral-small-3.1-24b-instruct:free,qwen/qwen3-235b-a22b:free,deepseek/deepseek-chat-v3-0324:free
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CEREBRAS_MODEL
        value: qwen-3-235b-a22b-instruct-2507
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_SECRET_KEY
        sync: false
      - key: GOOGLE_SHEETS_SCRIPT_URL
        sync: false
      - key: GOOGLE_SHEETS_SHARED_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
